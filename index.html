<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Translator – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fa;text-align:center;}
header{background:#fff;padding:15px;box-shadow:0 2px 5px rgba(0,0,0,.1);}
.container{width:90%;max-width:900px;margin:30px auto;}
#ad-top,#ad-middle{background:#eee;padding:20px;margin:20px 0;border-radius:8px;}
.upload-btn{display:inline-block;padding:15px 30px;background:#2563eb;color:#fff;border-radius:6px;cursor:pointer;margin:20px 0;}
.buttons{margin-top:10px;}
.buttons button{padding:10px 20px;margin:5px;border:none;border-radius:5px;cursor:pointer;color:#fff;}
.tools{background:#10b981;}
.home{background:#f59e0b;}
</style>
</head>
<body>

<header><h2>PDF Translator – EasyUseHub</h2></header>

<div class="container">
<div id="ad-top"><strong>Translate Your PDF</strong> – Translate your PDF text into any language easily.</div>

<p>Click below to translate your PDF file</p>

<label class="upload-btn" onclick="openTranslator()">
Upload File
</label>

<div id="ad-middle">Middle Ad Placeholder</div>

<div class="buttons">
<button class="tools" onclick="window.location.href='https://easyusehub.blogspot.com/p/free-pdf-tools-online.html'">All PDF Tools</button>
<button class="home" onclick="window.location.href='https://easyusehub.blogspot.com/?m=1'">Home</button>
</div>
</div>

<script>
function openTranslator(){
    // PDF translator open in same tab
    window.location.href = "https://pdfsimpli.com/lp/translate-pdf/";
}
</script>

</body>
</html>
